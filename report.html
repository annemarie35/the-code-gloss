                        breadcrumb.append(rootCrumb)
                        navStack.forEach(function (entry, i) {
                            var sep = el('span', { className: 'tm-sep' })
                            sep.append(txt('›'))
                            breadcrumb.append(sep)
                            var crumb = el('span')
                            crumb.append(txt(entry.name))
                            crumb.addEventListener(
                                'click',
                                (function (idx) {
                                    return function () {
                                        currentRoot = navStack[idx].node
                                        navStack = navStack.slice(0, idx + 1)
                                        animateTransition()
                                    }
                                })(i)
                            )
                            breadcrumb.append(crumb)
                        })
                    }

                    // Animated transition: fade out, re-layout, fade in
                    function animateTransition() {
                        svg.style.opacity = '0.3'
                        svg.style.transition = 'opacity 0.15s ease'
                        setTimeout(function () {
                            renderTreemap()
                            svg.style.opacity = '1'
                        }, 150)
                    }

                    function clearHighlight() {
                        svg.querySelectorAll('.tm-file').forEach(function (r) {
                            r.setAttribute('stroke', 'none')
                            r.setAttribute('stroke-width', '0')
                        })
                    }

                    function highlightFile(path) {
                        clearHighlight()
                        svg.querySelectorAll('.tm-file').forEach(function (r) {
                            if (r.getAttribute('data-path') === path) {
                                r.setAttribute('stroke', '#f59e0b')
                                r.setAttribute('stroke-width', '2')
                            }
                        })
                    }

                    function showDetail(f) {
                        selectedPath = f.path
                        highlightFile(f.path)
                        detailBody.replaceChildren()
                        var title = el('div', { className: 'tm-detail-title' })
                        title.append(txt(f.path))
                        detailBody.append(title)

                        var jump = el('div', {
                            className: 'tm-detail-links',
                            style: { display: 'flex', gap: '6px', marginBottom: '10px' }
                        })
                        ;['Hotspots', 'Graph'].forEach(function (tab) {
                            var b = el('button', { className: 'chip', style: { cursor: 'pointer' } })
                            b.append(txt('View in ' + tab.toLowerCase()))
                            b.addEventListener('click', function () {
                                focusFileOnTab(tab, f.path)
                            })
                            jump.append(b)
                        })
                        detailBody.append(jump)

                        function row(label, value) {
                            var r = el('div', { className: 'tm-detail-row' })
                            var l = el('span')
                            l.append(txt(label))
                            var v = el('span')
                            v.append(txt(String(value)))
                            r.append(l, v)
                            detailBody.append(r)
                        }

                        row('Lines of code', f.loc)
                        row('Cyclomatic complexity', f.cyclomatic_complexity)
                        row('Churn count', f.churn_count)
                        row('Hotspot score', fmt(f.hotspot_score, 1))
                        row('Public methods', f.public_methods)
                        row('Properties', f.properties)

                        var age = ageMap[f.path]
                        if (age) {
                            row('Days since modified', age.days_since_modified)
                            if (age.last_modified) {
                                row('Last modified', String(age.last_modified).slice(0, 10))
                            }
                        }

                        var own = ownerMap[f.path]
                        if (own && own.authors) {
                            var ownerTitle = el('div', {
                                style: {
                                    marginTop: '12px',
                                    marginBottom: '6px',
                                    color: '#94a3b8',
                                    fontSize: '11px',
                                    textTransform: 'uppercase',
                                    letterSpacing: '0.06em'
                                }
                            })
                            ownerTitle.append(txt('Ownership'))
                            detailBody.append(ownerTitle)
                            own.authors.slice(0, 5).forEach(function (a) {
                                var idx = authorIndex[a.name] != null ? authorIndex[a.name] % PALETTE.length : 0
                                var r = el('div', { className: 'tm-detail-row' })
                                var nameWrap = el('span', {
                                    style: { display: 'flex', alignItems: 'center', gap: '6px' }
                                })
                                var dot = el('span', {
                                    style: {
                                        display: 'inline-block',
                                        width: '8px',
                                        height: '8px',
                                        borderRadius: '50%',
                                        background: PALETTE[idx],
                                        flexShrink: '0'
                                    }
                                })
                                var nameTxt = el('span')
                                nameTxt.append(txt(a.name))
                                nameWrap.append(dot, nameTxt)
                                var v = el('span')
                                v.append(txt(fmt(a.pct, 0) + '%'))
                                r.append(nameWrap, v)
                                detailBody.append(r)
                            })
                        }

                        detail.classList.add('open')
                    }

                    function renderTreeNode(svgNode, node, x, y, w, h, depth) {
                        if (w < 1 || h < 1) return
                        var pad = 2
                        var headerH = depth > 0 ? 18 : 0
                        var innerX = x + pad
                        var innerY = y + headerH + pad
                        var innerW = w - pad * 2
                        var innerH = h - headerH - pad * 2
                        if (innerW < 1 || innerH < 1) return

                        if (depth > 0) {
                            // Directory background — clickable
                            var dirBg = svgEl('rect', {
                                x: String(x),
                                y: String(y),
                                width: String(w),
                                height: String(h),
                                fill: '#0d1117',
                                stroke: '#1e293b',
                                'stroke-width': '1',
                                rx: '3',
                                class: 'tm-dir-bg',
                                'data-dir': node.name,
                                style: 'cursor:pointer;'
                            })
                            svgNode.append(dirBg)
                            // Directory label — also clickable
                            if (w > 40) {
                                var label = svgEl('text', {
                                    x: String(x + 6),
                                    y: String(y + 13),
                                    fill: '#94a3b8',
                                    'font-size': '10',
                                    'font-weight': '600',
                                    'font-family': 'monospace',
                                    class: 'tm-dir-label',
                                    'data-dir': node.name,
                                    style: 'cursor:pointer;pointer-events:auto;'
                                })
                                var maxLabelChars = Math.floor((w - 12) / 6)
                                var dirLabel = node.name
                                if (dirLabel.length > maxLabelChars)
                                    dirLabel = dirLabel.slice(0, maxLabelChars - 1) + '…'
                                label.append(txt(dirLabel))
                                svgNode.append(label)
                            }
                        }

                        // Collect children
                        var items = []
                        var dirKeys = Object.keys(node.children)
                        dirKeys.forEach(function (k) {
                            var child = node.children[k]
                            if (child.totalLoc > 0) {
                                items.push({ size: child.totalLoc, data: { type: 'dir', node: child, name: k } })
                            }
                        })
                        node.files.forEach(function (f) {
                            if (f.loc > 0) {
                                items.push({ size: f.loc, data: { type: 'file', file: f } })
                            }
                        })

                        if (items.length === 0) return
                        var rects = squarify(items, innerX, innerY, innerW, innerH)

                        rects.forEach(function (r) {
                            if (r.data.type === 'file') {
                                var fData = fileMap[r.data.file.path]
                                var color = fData ? colorForFile(fData) : '#334155'
                                var gap = 1
                                var rw = Math.max(0, r.w - gap)
                                var rh = Math.max(0, r.h - gap)
                                if (rw < 1 || rh < 1) return
                                var rect = svgEl('rect', {
                                    x: String(r.x),
                                    y: String(r.y),
                                    width: String(rw),
                                    height: String(rh),
                                    fill: color,
                                    class: 'tm-file',
                                    'data-path': r.data.file.path,
                                    rx: '2',
                                    style: 'cursor:pointer;transition:opacity 0.15s;'
                                })
                                rect.addEventListener('mouseenter', function () {
                                    rect.setAttribute('opacity', '1')
                                })
                                rect.addEventListener('mouseleave', function () {
                                    rect.setAttribute('opacity', '0.88')
                                })
                                rect.setAttribute('opacity', '0.88')
                                svgNode.append(rect)
                                // File name label
                                if (rw > 36 && rh > 14) {
                                    var textEl = svgEl('text', {
                                        x: String(r.x + 3),
                                        y: String(r.y + 12),
                                        fill: '#e2e8f0',
                                        'font-size': '9',
                                        'font-family': 'monospace',
                                        'pointer-events': 'none',
                                        opacity: '0.85'
                                    })
                                    var maxChars = Math.floor((rw - 6) / 5.5)
                                    var lbl = r.data.file.name
                                    if (lbl.length > maxChars) lbl = lbl.slice(0, maxChars - 1) + '…'
                                    textEl.append(txt(lbl))
                                    svgNode.append(textEl)
                                }
                                // LOC label on larger rects
                                if (rw > 50 && rh > 26) {
                                    var locEl = svgEl('text', {
                                        x: String(r.x + 3),
                                        y: String(r.y + 23),
                                        fill: '#94a3b8',
                                        'font-size': '8',
                                        'font-family': 'monospace',
                                        'pointer-events': 'none',
                                        opacity: '0.7'
                                    })
                                    locEl.append(txt(r.data.file.loc + ' loc'))
                                    svgNode.append(locEl)
                                }
                            } else {
                                renderTreeNode(svgNode, r.data.node, r.x, r.y, r.w, r.h, depth + 1)
                            }
                        })
                    }

                    function renderCircleNode(svgNode, node, cx, cy, r, depth) {
                        if (r < 2) return

                        // Draw parent circle for directories
                        if (depth > 0) {
                            var bg = svgEl('circle', {
                                cx: String(cx),
                                cy: String(cy),
                                r: String(r),
                                fill: '#0d1117',
                                stroke: '#1e293b',
                                'stroke-width': '1',
                                class: 'tm-dir-bg',
                                'data-dir': node.name,
                                style: 'cursor:pointer;'
                            })
                            svgNode.append(bg)
                            // Label at top of circle
                            if (r > 25) {
                                var label = svgEl('text', {
                                    x: String(cx),
                                    y: String(cy - r + 14),
                                    fill: '#94a3b8',
                                    'font-size': '10',
                                    'font-weight': '600',
                                    'font-family': 'monospace',
                                    'text-anchor': 'middle',
                                    class: 'tm-dir-label',
                                    'data-dir': node.name,
                                    style: 'cursor:pointer;pointer-events:auto;'
                                })
                                var maxChars = Math.floor((r * 2 - 12) / 6)
                                var dirLabel = node.name
                                if (dirLabel.length > maxChars) dirLabel = dirLabel.slice(0, maxChars - 1) + '…'
                                label.append(txt(dirLabel))
                                svgNode.append(label)
                            }
                        }

                        // Collect children
                        var items = []
                        var dirKeys = Object.keys(node.children)
                        dirKeys.forEach(function (k) {
                            var child = node.children[k]
                            if (child.totalLoc > 0) {
                                items.push({ size: child.totalLoc, data: { type: 'dir', node: child, name: k } })
                            }
                        })
                        node.files.forEach(function (f) {
                            if (f.loc > 0) {
                                items.push({ size: f.loc, data: { type: 'file', file: f } })
                            }
                        })

                        if (items.length === 0) return
                        var innerR = depth > 0 ? r * 0.88 : r
                        var circles = circlePack(items, cx, cy, innerR)

                        circles.forEach(function (c) {
                            if (c.data.type === 'file') {
                                var fData = fileMap[c.data.file.path]
                                var color = fData ? colorForFile(fData) : '#334155'
                                var circ = svgEl('circle', {
                                    cx: String(c.cx),
                                    cy: String(c.cy),
                                    r: String(Math.max(0, c.r - 0.5)),
                                    fill: color,
                                    class: 'tm-file',
                                    'data-path': c.data.file.path,
                                    style: 'cursor:pointer;transition:opacity 0.15s;'
                                })
                                circ.addEventListener('mouseenter', function () {
                                    circ.setAttribute('opacity', '1')
                                })
                                circ.addEventListener('mouseleave', function () {
                                    circ.setAttribute('opacity', '0.88')
                                })
                                circ.setAttribute('opacity', '0.88')
                                svgNode.append(circ)
                                // Label if circle big enough
                                if (c.r > 20) {
                                    var textEl = svgEl('text', {
                                        x: String(c.cx),
                                        y: String(c.cy + 1),
                                        fill: '#e2e8f0',
                                        'font-size': '9',
                                        'font-family': 'monospace',
                                        'pointer-events': 'none',
                                        'text-anchor': 'middle',
                                        opacity: '0.85'
                                    })
                                    var maxC = Math.floor((c.r * 2 - 8) / 5.5)
                                    var lbl = c.data.file.name
                                    if (lbl.length > maxC) lbl = lbl.slice(0, maxC - 1) + '…'
                                    textEl.append(txt(lbl))
                                    svgNode.append(textEl)
                                }
                                if (c.r > 30) {
                                    var locEl = svgEl('text', {
                                        x: String(c.cx),
                                        y: String(c.cy + 12),
                                        fill: '#94a3b8',
                                        'font-size': '8',
                                        'font-family': 'monospace',
                                        'pointer-events': 'none',
                                        'text-anchor': 'middle',
                                        opacity: '0.7'
                                    })
                                    locEl.append(txt(c.data.file.loc + ' loc'))
                                    svgNode.append(locEl)
                                }
                            } else {
                                renderCircleNode(svgNode, c.data.node, c.cx, c.cy, c.r, depth + 1)
                            }
                        })
                    }

                    function renderTreemap() {
                        while (svg.firstChild) svg.removeChild(svg.firstChild)
                        if (layoutMode === 'circle') {
                            var cr = Math.min(svgW, svgH) / 2
                            renderCircleNode(svg, currentRoot, svgW / 2, svgH / 2, cr, 0)
                        } else {
                            renderTreeNode(svg, currentRoot, 0, 0, svgW, svgH, 0)
                        }
                        updateBreadcrumb()
                        updateLegend()
                        if (selectedPath) highlightFile(selectedPath)
                    }

                    // Metric change — recolor without re-layout
                    select.addEventListener('change', function () {
                        svg.querySelectorAll('.tm-file').forEach(function (rect) {
                            var path = rect.getAttribute('data-path')
                            var f = fileMap[path]
                            if (f) rect.setAttribute('fill', colorForFile(f))
                        })
                        updateLegend()
                        // Update detail panel color context
                        if (selectedPath && fileMap[selectedPath]) showDetail(fileMap[selectedPath])
                    })

                    // Click: directory = zoom in, file = show detail, label = zoom in
                    svg.addEventListener('click', function (e) {
                        var target = e.target
                        var dirName = target.getAttribute('data-dir')
                        var filePath = target.getAttribute('data-path')

                        if (dirName) {
                            // Clicked a directory bg or label — drill down
                            function findDir(node, name) {
                                var keys = Object.keys(node.children)
                                for (var i = 0; i < keys.length; i++) {
                                    if (node.children[keys[i]].name === name) return node.children[keys[i]]
                                    var found = findDir(node.children[keys[i]], name)
                                    if (found) return found
                                }
                                return null
                            }
                            var dirNode = findDir(currentRoot, dirName)
                            if (dirNode) {
                                navStack.push({ name: dirNode.name, node: dirNode })
                                currentRoot = dirNode
                                animateTransition()
                            }
                        } else if (filePath) {
                            // Clicked a file — show detail panel
                            var f = fileMap[filePath]
                            if (f) showDetail(f)
                        }
                    })

                    // Hover tooltip
                    svg.addEventListener('mousemove', function (e) {
                        var target = e.target
                        if (target.classList && target.classList.contains('tm-file')) {
                            var path = target.getAttribute('data-path')
                            var f = fileMap[path]
                            if (f) {
                                tooltip.replaceChildren()
                                tooltip.append(
                                    el(
                                        'div',
                                        { style: { fontWeight: '600', marginBottom: '4px', color: '#93c5fd' } },
                                        f.path
                                    )
                                )
                                tooltip.append(
                                    el(
                                        'div',
                                        null,
                                        'LOC: ' +
                                            f.loc +
                                            '  CC: ' +
                                            f.cyclomatic_complexity +
                                            '  Churn: ' +
                                            f.churn_count
                                    )
                                )
                                tooltip.append(el('div', null, 'Hotspot: ' + fmt(f.hotspot_score, 1)))
                                tooltip.style.display = 'block'
                                tooltip.style.left = e.clientX + 14 + 'px'
                                tooltip.style.top = e.clientY + 14 + 'px'
                            }
                        } else if (target.getAttribute('data-dir')) {
                            var dn = target.getAttribute('data-dir')
                            tooltip.replaceChildren()
                            tooltip.append(el('div', { style: { fontWeight: '600', color: '#94a3b8' } }, '📁 ' + dn))
                            tooltip.append(el('div', null, 'Click to zoom in'))
                            tooltip.style.display = 'block'
                            tooltip.style.left = e.clientX + 14 + 'px'
                            tooltip.style.top = e.clientY + 14 + 'px'
                        } else {
                            tooltip.style.display = 'none'
                        }
                    })

                    svg.addEventListener('mouseleave', function () {
                        tooltip.style.display = 'none'
                    })

                    // Cross-tab entry point: reset to the root view (the file may sit inside
                    // a zoomed-out directory), then highlight it and open its detail panel.
                    registerFileFocus('treemap', function (path) {
                        var f = fileMap[path]
                        if (!f) return // beyond the top-2000 LOC cap
                        navStack = []
                        currentRoot = tree
                        renderTreemap()
                        showDetail(f)
                    })

                    renderTreemap()
                    return container
                }

                /* ---- Trends tab ---- */
                function buildTrendsTab() {
                    var container = document.createDocumentFragment()
                    var history = R.history || []

                    var info = buildTabInfo(
                        'Score Trends',
                        'Track how your repository scores change over time. Each data point represents an analysis run at a unique commit.'
                    )
                    container.append(info)

                    if (history.length < 2) {
                        var empty = el('div', { className: 'tr-empty' })
                        empty.append(
                            txt(
                                'Trends appear after multiple analysis runs on different commits. Run barad-dur analyze again after making commits to start tracking.'
                            )
                        )
                        container.append(empty)
                        return container
                    }

                    // Build metric options from first entry
                    // Note: HistoryEntry serializes its categories field as "category_scores"
                    var metricNames = ['Overall Score']
                    var catKeys = Object.keys(history[0].category_scores || {}).sort()
                    catKeys.forEach(function (k) {
                        metricNames.push(k)
                    })
                    var mKeys = Object.keys(history[0].metrics || {}).sort()
                    mKeys.forEach(function (k) {
                        metricNames.push(k)
                    })

                    // Controls row
                    var controls = el('div', { className: 'tr-controls' })
                    var label = el('label')
                    label.append(txt('Metric: '))
                    var select = el('select', { className: 'tr-select' })
                    select.id = 'tr-metric-select'
                    metricNames.forEach(function (name) {
                        var opt = el('option')
                        opt.value = name
                        opt.append(txt(name))
                        select.append(opt)
                    })
                    label.append(select)
                    controls.append(label)

                    // Legend — conditionally rendered when backfill entries exist
                    if (
                        window.R.history.some(function (e) {
                            return e.source === 'backfill'
                        })
                    ) {
                        var leg = el('div')
                        leg.className = 'tr-legend'

                        var dotBackfill = el('span')
                        dotBackfill.className = 'tr-legend-dot'
                        dotBackfill.style.cssText = 'border:2px solid #8b949e;background:transparent;'
                        leg.append(dotBackfill)
                        leg.append(txt('Backfill'))

                        var dotLive = el('span')
                        dotLive.className = 'tr-legend-dot'
                        dotLive.style.cssText = 'background:var(--c-good);'
                        leg.append(dotLive)
                        leg.append(txt('Live analysis'))

                        controls.append(leg)
                    }

                    container.append(controls)

                    // Chart container
                    var chartDiv = el('div', { className: 'tr-chart' })
                    chartDiv.id = 'tr-chart'
                    container.append(chartDiv)

                    // Tooltip
                    var tooltip = el('div', { className: 'tr-tooltip' })
                    container.append(tooltip)

                    function getScore(entry, metric) {
                        if (metric === 'Overall Score') return entry.overall_score
                        if (entry.category_scores && entry.category_scores[metric] !== undefined)
                            return entry.category_scores[metric]
                        if (entry.metrics && entry.metrics[metric] !== undefined) return entry.metrics[metric]
                        return 0
                    }

                    function renderChart() {
                        var metric = select.value
                        var W = 900,
                            H = 350
                        var pad = { top: 20, right: 30, bottom: 40, left: 45 }
                        var cw = W - pad.left - pad.right
                        var ch = H - pad.top - pad.bottom

                        var scores = history.map(function (e) {
                            return getScore(e, metric)
                        })
                        var dates = history.map(function (e) {
                            return new Date(e.timestamp)
                        })

                        var minT = dates[0].getTime()
                        var maxT = dates[dates.length - 1].getTime()
                        var rangeT = maxT - minT || 1

                        // Dynamic Y-axis: pad 10 points above max and below min, clamped to 0-100
                        var rawMin = Math.min.apply(null, scores)
                        var rawMax = Math.max.apply(null, scores)
                        var yMin = Math.max(0, Math.floor((rawMin - 10) / 5) * 5)
                        var yMax = Math.min(100, Math.ceil((rawMax + 10) / 5) * 5)
                        if (yMin === yMax) {
                            yMin = Math.max(0, yMin - 10)
                            yMax = Math.min(100, yMax + 10)
                        }
                        var yRange = yMax - yMin || 1

                        function x(i) {
                            return pad.left + ((dates[i].getTime() - minT) / rangeT) * cw
                        }
                        function y(s) {
                            return pad.top + (1 - (s - yMin) / yRange) * ch
                        }

                        var svg =
                            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' +
                            W +
                            ' ' +
                            H +
                            '" style="width:100%;height:auto">'

                        // Grid lines and Y labels (avoid literal quote-hash in SVG attr values)
                        var h = String.fromCharCode(35)
                        var gridCol = h + '1e293b'
                        var labelCol = h + '8b949e'
                        var bgCol = h + '0d1117'
                        var gridSteps = 5
                        for (var gi = 0; gi <= gridSteps; gi++) {
                            var v = yMin + (yRange * gi) / gridSteps
                            v = Math.round(v)
                            var yy = y(v)
                            svg +=
                                '<line x1="' +
                                pad.left +
                                '" y1="' +
                                yy +
                                '" x2="' +
                                (W - pad.right) +
                                '" y2="' +
                                yy +
                                '" stroke="' +
                                gridCol +
                                '" stroke-width="1"/>'
                            svg +=
                                '<text x="' +
                                (pad.left - 8) +
                                '" y="' +
                                (yy + 4) +
                                '" text-anchor="end" fill="' +
                                labelCol +
                                '" font-size="11">' +
                                v +
                                '</text>'
                        }

                        // X-axis date labels
                        var labelCount = Math.min(history.length, 8)
                        var step = Math.max(1, Math.floor(history.length / labelCount))
                        for (var li = 0; li < history.length; li += step) {
                            var dx = x(li)
                            var d = dates[li]
                            var dateStr =
                                d.getFullYear() +
                                '-' +
                                String(d.getMonth() + 1).padStart(2, '0') +
                                '-' +
                                String(d.getDate()).padStart(2, '0')
                            svg +=
                                '<text x="' +
                                dx +
                                '" y="' +
                                (H - 5) +
                                '" text-anchor="middle" fill="' +
                                labelCol +
                                '" font-size="10">' +
                                dateStr +
                                '</text>'
                        }

                        // Line
                        var lastScore = scores[scores.length - 1]
                        var lineColor = scoreColor(lastScore)
                        var points = history
                            .map(function (_, i) {
                                return x(i) + ',' + y(scores[i])
                            })
                            .join(' ')
                        svg +=
                            '<polyline points="' +
                            points +
                            '" fill="none" stroke="' +
                            lineColor +
                            '" stroke-width="2" stroke-linejoin="round"/>'

                        // Dots
                        history.forEach(function (entry, i) {
                            var cx = x(i)
                            var cy = y(scores[i])
                            var isBackfill = entry.source === 'backfill'
                            var dotFill = isBackfill ? 'none' : scoreColor(scores[i])
                            var dotStroke = isBackfill ? scoreColor(scores[i]) : bgCol
                            var dotStyle = isBackfill ? ' style="pointer-events:all"' : ''
                            svg +=
                                '<circle class="tr-dot" cx="' +
                                cx +
                                '" cy="' +
                                cy +
                                '" r="4" fill="' +
                                dotFill +
                                '" ' +
                                'data-idx="' +
                                i +
                                '" stroke="' +
                                dotStroke +
                                '" stroke-width="1.5"' +
                                dotStyle +
                                (isBackfill ? ' data-backfill="1"' : '') +
                                '/>'
                        })

                        svg += '</svg>'
                        chartDiv.innerHTML = svg

                        // Wire dot hover events
                        chartDiv.querySelectorAll('.tr-dot').forEach(function (dot) {
                            dot.addEventListener('mouseenter', function (e) {
                                var idx = parseInt(dot.getAttribute('data-idx'), 10)
                                var entry = history[idx]
                                var d = new Date(entry.timestamp)
                                var dateStr =
                                    d.getFullYear() +
                                    '-' +
                                    String(d.getMonth() + 1).padStart(2, '0') +
                                    '-' +
                                    String(d.getDate()).padStart(2, '0')
                                var head7 = entry.head.substring(0, 7)
                                var srcLabel =
                                    dot.dataset.backfill === '1' ? 'Source: Backfill' : 'Source: Live analysis'
                                var lines =
                                    dateStr +
                                    ' (' +
                                    head7 +
                                    ')\n' +
                                    metric +
                                    ': ' +
                                    getScore(entry, metric) +
                                    '\n' +
                                    entry.counts.commits +
                                    ' commits, ' +
                                    entry.counts.files +
                                    ' files, ' +
                                    entry.counts.authors +
                                    ' authors\n' +
                                    srcLabel
                                tooltip.textContent = lines
                                tooltip.style.display = 'block'
                                tooltip.style.left = e.clientX + 14 + 'px'
                                tooltip.style.top = e.clientY + 14 + 'px'
                            })
                            dot.addEventListener('mouseleave', function () {
                                tooltip.style.display = 'none'
                            })
                        })
                    }

                    select.addEventListener('change', renderChart)
                    setTimeout(renderChart, 0)

                    return container
                }

                /* ---- Commit velocity ---- */
                function buildVelocitySection(buckets) {
                    var section = el('div', { className: 'section' })
                    var heading = el('h2', { className: 'section-title' })
                    heading.append(txt('Commit Velocity'))
                    var sub = el('p', { className: 'section-sub' })
                    sub.append(
                        txt(
                            'Commits per week across the analysis window. Sustained drops may indicate the codebase is becoming harder to change.'
                        )
                    )
                    section.append(heading, sub)

                    if (!buckets.length) {
                        var none = el('div', { className: 'no-data' })
                        none.append(txt('No commit data available.'))
                        section.append(none)
                        return section
                    }

                    var W = 900,
                        H = 260
                    var pad = { top: 20, right: 20, bottom: 50, left: 45 }
                    var cw = W - pad.left - pad.right
                    var ch = H - pad.top - pad.bottom
                    var n = buckets.length
                    var maxCount = buckets.reduce(function (m, b) {
                        return Math.max(m, b.commit_count)
                    }, 1)
                    var slotW = cw / n
                    var barW = Math.max(2, Math.floor(slotW) - 2)

                    var svg = svgEl('svg', {
                        viewBox: '0 0 ' + W + ' ' + H,
                        style: 'width:100%;height:auto;display:block'
                    })

                    // Grid lines + Y labels
                    var gridSteps = 4
                    for (var gi = 0; gi <= gridSteps; gi++) {
                        var v = Math.round((maxCount * gi) / gridSteps)
                        var yy = (pad.top + ch - (v / maxCount) * ch).toFixed(1)
                        svg.append(
                            svgEl('line', {
                                x1: String(pad.left),
                                y1: yy,
                                x2: String(W - pad.right),
                                y2: yy,
                                stroke: '#1e293b',
                                'stroke-width': '1'
                            })
                        )
                        var label = svgEl('text', {
                            x: String(pad.left - 6),
                            y: String(parseFloat(yy) + 4),
                            'text-anchor': 'end',
                            fill: '#8b949e',
                            'font-size': '11',
                            'font-family': '-apple-system,sans-serif'
                        })
                        label.append(txt(String(v)))
                        svg.append(label)
                    }

                    // Bars
                    buckets.forEach(function (b, i) {
                        var x = (pad.left + i * slotW + (slotW - barW) / 2).toFixed(1)
                        var barH = Math.max(1, (b.commit_count / maxCount) * ch)
                        var y = (pad.top + ch - barH).toFixed(1)
                        var pct = (b.commit_count / maxCount) * 100
                        var color = pct >= 60 ? 'var(--c-good)' : pct >= 30 ? 'var(--c-warn)' : 'var(--c-danger)'
                        var rect = svgEl('rect', {
                            x: x,
                            y: y,
                            width: String(barW),
                            height: barH.toFixed(1),
                            fill: color,
                            rx: '2'
                        })
                        var titleEl = svgEl('title')
                        titleEl.append(
                            txt(b.week_start + ': ' + b.commit_count + ' commits, ' + b.author_count + ' authors')
                        )
                        rect.append(titleEl)
                        svg.append(rect)
                    })

                    // X-axis date labels (~8 evenly spaced)
                    var labelStep = Math.max(1, Math.floor(n / 8))
                    for (var li = 0; li < n; li += labelStep) {
                        var lx = (pad.left + li * slotW + slotW / 2).toFixed(1)
                        var ly = H - 8
                        var dateLabel = svgEl('text', {
                            x: lx,
                            y: String(ly),
                            'text-anchor': 'middle',
                            fill: '#8b949e',
                            'font-size': '10',
                            'font-family': '-apple-system,sans-serif',
                            transform: 'rotate(-35 ' + lx + ' ' + ly + ')'
                        })
                        dateLabel.append(txt(buckets[li].week_start))
                        svg.append(dateLabel)
                    }

                    var chartWrap = el('div', { className: 'vel-chart' })
                    chartWrap.append(svg)
                    section.append(chartWrap)
                    return section
                }

                    )

                        buildExplainer('Understanding commit quality and author metrics', [
                            {
                                heading: 'How commit quality is scored',
                                text: 'Each commit message is scored 0\u2013100 using a heuristic. The per-author quality is the average across all their commits in the analysis window.'
                            },
                            {
                                heading: 'Scoring breakdown',
                                items: [
                                    'Base: +10 points for any non-empty message.',
                                    'Length: +10 (4\u201310 chars), +30 (11\u201350 chars), or +40 (51+ chars).',
                                    'Conventional prefix: +30 if the message starts with feat:, fix:, docs:, style:, refactor:, perf:, test:, chore:, ci:, or build:.',
                                    'Descriptive: +20 if the message has a body (newline) or exceeds 20 characters.',
                                    'Penalty: messages that are exactly "wip", "fix", "update", or "." are capped at 10.'
                                ]
                            },
                            {
                                heading: 'Files owned',
                                text: 'A file is "owned" by an author when they have more than 50% of the blame lines in that file. This is the same threshold used in the Ownership tab.'
                            },
                            {
                                heading: 'Activity status',
                                items: [
                                    'Green (Active): committed within the last 30 days.',
                                    'Yellow (Aging): last commit was 30\u201390 days ago.',
                                    'Red (Stale): no commits in over 90 days.'
                                ]
                            },
                            {
                                heading: 'Directories touched',
                                text: 'The number of unique parent directories across all files changed by this author\u2019s commits. A high number indicates broad codebase knowledge; a low number suggests a specialist focused on a narrow area.'
                            }
                        ])
                    )

                    var cards = (R.author_cards || []).slice()
                    if (cards.length === 0) {
                        var empty = el('div', { className: 'no-data' })
                        empty.append(txt('No author data available. Run with blame enabled.'))
                        container.append(empty)
                        return container
                    }

                    var toolbar = el('div', { className: 'ac-toolbar' })
                    var search = el('input', { className: 'ac-search', placeholder: 'Filter by name or email...' })
                    search.setAttribute('type', 'text')

                    var sortOptions = [
                        { key: 'commits', label: 'Commits' },
                        { key: 'files', label: 'Files Owned' },
                        { key: 'active', label: 'Last Active' },
                        { key: 'quality', label: 'Commit Quality' }
                    ]
                    var currentSort = 'commits'

                    var sortBtns = sortOptions.map(function (opt) {
                        var btn = el('button', { className: 'ac-sort-btn' + (opt.key === 'commits' ? ' active' : '') })
                        btn.append(txt(opt.label))
                        btn.addEventListener('click', function () {
                            currentSort = opt.key
                            toolbar.querySelectorAll('.ac-sort-btn').forEach(function (b) {
                                b.className = 'ac-sort-btn'
                            })
                            btn.className = 'ac-sort-btn active'
                            renderCards()
                        })
                        return btn
                    })

                    toolbar.append(search)
                    sortBtns.forEach(function (b) {
                        toolbar.append(b)
                    })

                    var grid = el('div', { className: 'ac-grid' })

                    function activityColor(days) {
                        if (days <= 30) return 'var(--c-good)'
                        if (days <= 90) return 'var(--c-warn)'
                        return 'var(--c-danger)'
                    }

                    function qualityColor(q) {
                        if (q >= 70) return 'var(--c-good)'
                        if (q >= 40) return 'var(--c-warn)'
                        return 'var(--c-danger)'
                    }

                    function renderCards() {
                        var q = search.value.toLowerCase()
                        var filtered = cards.filter(function (c) {
                            if (!q) return true
                            return c.name.toLowerCase().indexOf(q) >= 0 || c.email.toLowerCase().indexOf(q) >= 0
                        })

                        filtered.sort(function (a, b) {
                            if (currentSort === 'commits') return b.commit_count - a.commit_count
                            if (currentSort === 'files') return b.files_owned - a.files_owned
                            if (currentSort === 'active') return a.days_since_active - b.days_since_active
                            if (currentSort === 'quality') return b.avg_commit_quality - a.avg_commit_quality
                            return 0
                        })

                        grid.replaceChildren()
                        filtered.forEach(function (c) {
                            var card = el('div', { className: 'ac-card' })

                            var nameEl = el('div', { className: 'ac-name' })
                            var badge = el('span', { className: 'ac-badge' })
                            badge.style.backgroundColor = activityColor(c.days_since_active)
                            nameEl.append(badge, txt(c.name))
                            var emailEl = el('div', { className: 'ac-email' })
                            emailEl.append(txt(c.email))

                            var stats = el('div', { className: 'ac-stats' })
                            function addStat(label, value) {
                                var lbl = el('div', { className: 'ac-stat-label' })
                                lbl.append(txt(label))
                                var val = el('div', { className: 'ac-stat-value' })
                                val.append(txt(String(value)))
                                stats.append(lbl, val)
                            }
                            addStat('Commits', c.commit_count)
                            addStat('Files Owned', c.files_owned)
                            addStat('Lines Owned', c.lines_owned)
                            addStat('Dirs Touched', c.directories_touched)

                            var qLabel = el('div', { className: 'ac-stat-label', style: { marginTop: '8px' } })
                            qLabel.append(txt('Commit Quality'))
                            var qBar = el('div', {
                                style: { height: '6px', borderRadius: '3px', background: '#1e293b', marginTop: '4px' }
                            })
                            var qRounded = Math.round(c.avg_commit_quality)
                            var qFill = el('div', {
                                style: {
                                    height: '100%',
                                    borderRadius: '3px',
                                    width: qRounded + '%',
                                    background: qualityColor(qRounded)
                                }
                            })
                            qBar.append(qFill)
                            var qVal = el('div', { style: { fontSize: '11px', color: '#94a3b8', marginTop: '2px' } })
                            qVal.append(txt(qRounded + '/100'))

                            var activeEl = el('div', {
                                style: { fontSize: '12px', color: activityColor(c.days_since_active), marginTop: '8px' }
                            })
                            var daysText =
                                c.days_since_active === 0
                                    ? 'Active today'
                                    : c.days_since_active === 1
                                      ? '1 day ago'
                                      : c.days_since_active + ' days ago'
                            activeEl.append(txt(daysText))

                            var filesDiv = el('div', { className: 'ac-files' })
                            if (c.top_files && c.top_files.length > 0) {
                                var fLabel = el('div', { className: 'ac-stat-label' })
                                fLabel.append(txt('Top Files'))
                                filesDiv.append(fLabel)
                                c.top_files.forEach(function (f) {
                                    var fi = el('div', { className: 'ac-file-item' })
                                    fi.append(txt(f))
                                    filesDiv.append(fi)
                                })
                            }

                            card.append(nameEl, emailEl, stats, qLabel, qBar, qVal, activeEl, filesDiv)
                            grid.append(card)
                        })
                    }

                    search.addEventListener('input', renderCards)
                    renderCards()

                    container.append(toolbar, grid)
                    return container
                }

                    cbfBtn.addEventListener('click', function () {
                        document.body.classList.toggle('cbf')
                        if (document.body.classList.contains('cbf')) {
                            localStorage.setItem('cbf-palette', '1')
                        } else {
                            localStorage.removeItem('cbf-palette')
                        }
                        updateCbfBtn()
                    })
                    updateCbfBtn()
                    chips.append(cbfBtn)
                    var quickOpen = buildQuickOpen()
                    var qoBtn = el('button', {
                        className: 'chip',
                        title: 'Jump to file (Ctrl+K)',
                        style: { cursor: 'pointer' }
                    })
                    qoBtn.append(txt('🔍 Ctrl+K'))
                    qoBtn.addEventListener('click', quickOpen.open)
                    chips.append(qoBtn)
                    chips.append(buildThemeBtn())
                    headerRow.append(brandWrap, chips)
                    header.append(headerRow)

                    function safeRender(name, builder) {
                        try {
                            return builder()
                        } catch (e) {
                            console.error('Tab render error (' + name + '):', e)
                            var d = el('div', { className: 'tab-error' })
                            d.append(txt('Failed to render "' + name + '" tab. Open browser console for details.'))
                            return d
                        }
                    }

                    // Tabs
                    var tabNames = [
                        'Overview',
                        'Hotspots',
                        'Coupling',
                        'Graph',
                        'Ownership',
                        'Age',
                        'Treemap',
                        'Trends',
                        'Authors',
                        'Dependencies',
                        'Audit'
                    ]
                    var tabContents = [
                        buildOverviewTab,
                        buildHotspotsTab,
                        buildCouplingTab,
                        buildGraphTab,
                        buildOwnershipTab,
                        buildAgeTab,
                        buildTreemapTab,
                        buildTrendsTab,
                        buildAuthorsTab,
                        buildDepsTab,
                        buildAuditTab
                    ]

                    var tabs = el('div', { className: 'tabs' })
                    var contentDivs = []
                    var activeTab = 0

                    tabNames.forEach(function (name, i) {
                        var tab = el('button', { className: 'tab' + (i === 0 ? ' active' : '') })
                        tab.append(txt(name))

                        var contentDiv = el('div', { className: 'tab-content' + (i === 0 ? ' active' : '') })
                        contentDivs.push(contentDiv)

                        tab.addEventListener(
                            'click',
                            (function (idx, t) {
                                return function () {
                                    // Remove active from all
                                    var allTabs = tabs.querySelectorAll('.tab')
                                    allTabs.forEach(function (tb) {
                                        tb.className = 'tab'
                                    })
                                    contentDivs.forEach(function (cd) {
                                        cd.className = 'tab-content'
                                    })
                                    t.className = 'tab active'
                                    contentDivs[idx].className = 'tab-content active'

                                    // Lazy-render on first visit
                                    if (contentDivs[idx].dataset.rendered !== '1') {
                                        contentDivs[idx].replaceChildren(safeRender(tabNames[idx], tabContents[idx]))
                                        contentDivs[idx].dataset.rendered = '1'
                                    }
                                    setHashState(tabNames[idx])
                                }
                            })(i, tab)
                        )

                        tabs.append(tab)
                    })

                    // Pre-render overview immediately
                    contentDivs[0].replaceChildren(safeRender(tabNames[0], tabContents[0]))
                    contentDivs[0].dataset.rendered = '1'

                    // Expose tab-switching for drill-through links
                    window.__switchToTab = function (tabName, sortBy) {
                        var idx = tabNames.indexOf(tabName.charAt(0).toUpperCase() + tabName.slice(1))
                        if (idx < 0) return
                        var allTabs = tabs.querySelectorAll('.tab')
                        allTabs.forEach(function (tb) {
                            tb.className = 'tab'
                        })
                        contentDivs.forEach(function (cd) {
                            cd.className = 'tab-content'
                        })
                        allTabs[idx].className = 'tab active'
                        contentDivs[idx].className = 'tab-content active'
                        if (contentDivs[idx].dataset.rendered !== '1') {
                            contentDivs[idx].replaceChildren(safeRender(tabNames[idx], tabContents[idx]))
                            contentDivs[idx].dataset.rendered = '1'
                        }
                        contentDivs[idx].scrollIntoView({ behavior: 'smooth', block: 'start' })
                    }

                    app.replaceChildren(header, tabs, ...contentDivs)

                    // Restore tab + file selection from the URL hash (deep links)
                    var initial = parseHashState()
                    if (initial.tab) {
                        if (initial.file) {
                            focusFileOnTab(initial.tab, initial.file)
                        } else {
                            window.__switchToTab(initial.tab)
                        }
                    }
                }

                initTheme()
                renderApp()
            })()
        </script>
    </body>
</html>
