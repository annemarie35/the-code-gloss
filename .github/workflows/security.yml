name: Security

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: write
    pull-requests: write
    security-events: write

jobs:
    vice-audit:
        name: VICE Security Audit
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
