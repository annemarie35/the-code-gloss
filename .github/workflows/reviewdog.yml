name: Reviewdog

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
        branches:
            - 'main'

jobs:
    eslint:
        name: ESLint
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 'lts/*'
                  cache: 'npm'
                  check-latest: true
            - name: Install dependencies
              run: npm ci
            - uses: reviewdog/action-eslint@v1
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  reporter: github-pr-review
                  eslint_flags: 'src/ __tests__/'
